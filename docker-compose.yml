version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: zytlog
      POSTGRES_USER: zytlog
      POSTGRES_PASSWORD: zytlog
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir -e /app/backend &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://zytlog:zytlog@db:5432/zytlog
      AUTH_ENABLED: "true"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: zytlog
      KEYCLOAK_VERIFY_AUDIENCE: "false"
      KEYCLOAK_AUDIENCE: zytlog-api
    volumes:
      - ./backend:/app/backend
    ports:
      - '8000:8000'
    depends_on:
      - db
      - keycloak

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "cd frontend && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app/frontend
    ports:
      - '5173:5173'

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - '8080:8080'

volumes:
  postgres_data:
