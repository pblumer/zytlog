services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: zytlog
      POSTGRES_USER: zytlog
      POSTGRES_PASSWORD: zytlog
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir fastapi 'uvicorn[standard]' sqlalchemy 'psycopg[binary]' alembic pydantic pydantic-settings 'PyJWT[crypto]' reportlab &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://zytlog:zytlog@db:5432/zytlog
      AUTH_ENABLED: "true"
      KEYCLOAK_ISSUER: http://pi-server-03.home:8080/realms/zytlog
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/zytlog/protocol/openid-connect/certs
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: zytlog
      KEYCLOAK_VERIFY_AUDIENCE: "false"
      KEYCLOAK_AUDIENCE: zytlog-api
    volumes:
      - ./backend:/app/backend
    ports:
      - '8000:8000'
    depends_on:
      - db
      - keycloak

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "cd frontend && npm install && npm i @rollup/rollup-linux-arm64-musl --no-save && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://pi-server-03.home:8000/api/v1
      VITE_KEYCLOAK_URL: http://pi-server-03.home:8080
      VITE_KEYCLOAK_REALM: zytlog
      VITE_KEYCLOAK_CLIENT_ID: zytlog-frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - '5173:5173'

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import
    depends_on:
      - keycloak-db

volumes:
  postgres_data:
  keycloak_postgres_data:
